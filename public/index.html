    <div class="sidebar-footer">
      <div class="profile-trigger" id="profile-trigger" onclick="ProfileMenu.open()">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="sidebar-avatar">AK</div>
          <span class="profile-online-dot"></span>
        </div>
        <div class="profile-info">
          <div class="profile-name" id="sidebar-name" title="Abdullah Khan">Abdullah</div>
          <div class="profile-role" id="sidebar-title">Manager · IRL</div>
        </div>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Header -->
    <header class="main-header" id="main-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title" id="page-title">Dashboard</h1>
      </div>
      <div class="header-right" style="display:flex; align-items:center; gap:16px;">
        <div style="position:relative; cursor:pointer;" onclick="Notifications.showPanel()" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" style="width:22px;height:22px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-badge" style="display:none; position:absolute; top:-4px; right:-4px; background:#DC2626; color:white; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:50%; align-items:center; justify-content:center; border:2px solid white;">0</span>
        </div>
        <div class="cycle-swiper" style="display:flex; align-items:center; background:#EFF6FF; border-radius:12px; padding:4px;">
          <button class="cycle-swiper-btn" onclick="Utils.cyclePrev()" title="Previous Cycle" style="width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:#2563EB; transition:all 0.2s;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="header-date" id="header-date" style="padding:0 8px; font-size:12px; font-weight:600; color:#2563EB; text-align:center; min-width:120px; background:none;"></div>
          <button class="cycle-swiper-btn" onclick="Utils.cycleNext()" title="Next Cycle" style="width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:#2563EB; transition:all 0.2s;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Pages Container -->
    <div class="page-container" id="page-container">
      <!-- Dashboard Page -->
      <div class="page active" id="page-dashboard"></div>

      <!-- Riders Page -->
      <div class="page" id="page-riders"></div>

      <!-- Daily Logs Page -->
      <div class="page" id="page-daily-logs"></div>

      <!-- PAYROLL PAGE -->
      <div id="page-payroll" class="page"></div>

      <!-- EXPENSES PAGE -->
      <div id="page-expenses" class="page"></div>

      <!-- FLEET MANAGEMENT PAGE -->
      <div id="page-fleet" class="page"></div>

      <!-- REPORTS CENTER PAGE -->
      <div id="page-reports-center" class="page"></div>

      <!-- LIVE TRACKING PAGE -->
      <div id="page-live-tracking" class="page"></div>

      <!-- NOTIFICATIONS PAGE -->
      <div id="page-notifications" class="page"></div>

      <!-- Weekly Sprints Page -->
      <div id="page-sprints" class="page"></div>

      <!-- BACKUP PAGE -->
      <div id="page-backup" class="page"></div>
    </div>
  </main>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Modal</h2>
        <button class="modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Command Palette -->
  <div class="cmd-palette-overlay" id="cmd-palette-overlay" style="display:none;">
    <div class="cmd-palette">
      <div class="cmd-search-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="cmd-search-input" placeholder="Search riders, bikes, or pages..." autocomplete="off">
        <span class="cmd-shortcut-hint">ESC to close</span>
      </div>
      <div class="cmd-results" id="cmd-results"></div>
    </div>
  </div>

  <!-- Global Loading Overlay -->
  <div id="global-loading" class="global-loading">
    <div class="loader-content">
      <div class="loader-company-name">INSPIRING ROADS LOGISTICS</div>
      
      <div class="loader-avatar-container">
        <div class="loader-pulse-ring"></div>
        <img class="loader-avatar-img" id="loader-avatar-img" src="" alt="Supervisor" style="display:none;">
        <div class="loader-avatar-fallback" id="loader-avatar-fallback">AK</div>
      </div>
      
      <div class="loader-bar">
        <div class="loader-fill"></div>
      </div>
      
      <div class="loader-main-text">
        <span id="loader-text">Loading</span><span class="animated-dots"></span>
      </div>
      <div class="loader-subtext" id="loader-subtext"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
